<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1920">
    <meta name="template:media-height" content="1080">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            font-family: 'PingFang TC', 'Noto Sans TC', 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', sans-serif;
        }

        .page-container {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .background-layer {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .background-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .background-layer:empty {
            display: none;
        }

        .gradient-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0.0) 0%,
                    rgba(255, 255, 255, 0.0) 58%,
                    rgba(42, 30, 20, 0.10) 72%,
                    rgba(42, 30, 20, 0.68) 100%);
        }

        .content-layer {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            padding: 70px 110px 52px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            color: #3a2a1d;
        }

        .video-title {
            max-width: 980px;
            padding: 22px 30px;
            border: 6px solid #4a3424;
            border-radius: 28px;
            background: rgba(255, 246, 197, 0.94);
            box-shadow: 0 12px 24px rgba(78, 54, 30, 0.16);
            font-size: 54px;
            font-weight: 800;
            line-height: 1.18;
        }

        .video-title:empty {
            display: none;
        }

        .spacer {
            flex-grow: 1;
        }

        .subtitle-wrapper {
            display: flex;
            justify-content: center;
        }

        .text {
            max-width: 1420px;
            padding: 24px 34px;
            border: 5px solid #4a3424;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 22px rgba(45, 33, 20, 0.18);
            color: #2d3a45;
            font-size: 42px;
            font-weight: 700;
            line-height: 1.35;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="page-container">
        <div class="background-layer" id="bg-layer"></div>
        <div class="gradient-overlay"></div>
        <div class="content-layer">
            <div class="video-title">{{title}}</div>
            <div class="spacer"></div>
            <div class="subtitle-wrapper">
                <div class="text">{{text}}</div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            var imageUrl = "{{image}}";
            var bgLayer = document.getElementById('bg-layer');

            if (imageUrl && imageUrl.trim() !== "" && imageUrl !== "None") {
                var img = document.createElement('img');
                img.src = imageUrl;
                img.alt = "Background";
                bgLayer.appendChild(img);
            }
        })();
    </script>
</body>

</html>
